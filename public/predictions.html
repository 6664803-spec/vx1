<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>往期预测记录 - 幸运飞艇实时监控</title>
  <style>
    :root { --bg:#08101f; --text:#eef2ff; --muted:#9aa6c3; --card:#101a31; --border:rgba(255,255,255,.08); }
    * { box-sizing:border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:linear-gradient(180deg, #050816, #08101f 28%, #04060f); color:var(--text); }
    header { padding:20px 24px 12px; position:sticky; top:0; z-index:5; background:rgba(5,8,22,.88); backdrop-filter: blur(10px); border-bottom:1px solid var(--border); }
    h1 { margin:0 0 8px; font-size:22px; }
    .sub { color:var(--muted); font-size:13px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .nav { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .nav a { color:#dbe5ff; text-decoration:none; padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); }
    .nav a:hover { text-decoration:none; background:rgba(105,169,255,.15); border-color:rgba(105,169,255,.28); }
    .nav a.primary { background:rgba(74,222,128,.14); border-color:rgba(74,222,128,.28); color:#bbf7d0; }
    a { color:#9ad0ff; text-decoration:none; }
    a:hover { text-decoration:underline; }
    main { max-width:1600px; margin:0 auto; padding:18px; }
    .card { background:linear-gradient(180deg, rgba(18,26,51,.96), rgba(10,16,31,.96)); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:0 12px 50px rgba(0,0,0,.22); }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
    .chip { padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.06); color:#dbe5ff; }
    .grid { display:grid; gap:14px; }
    .stats { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .accuracy-grid { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:10px; }
    .accuracy-card { padding:12px; border-radius:12px; background:rgba(255,255,255,.04); }
    .accuracy-card .title { color:var(--muted); font-size:12px; }
    .accuracy-card .value { font-size:24px; font-weight:700; margin-top:6px; font-variant-numeric:tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .accuracy-card .sub { margin-top:6px; color:var(--muted); font-size:12px; line-height:1.4; }
    .compare-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    .compare-box { padding:14px; border-radius:12px; background:rgba(255,255,255,.04); }
    .compare-box h3 { margin:0 0 8px; font-size:14px; }
    .compare-line { display:flex; justify-content:space-between; gap:10px; margin:8px 0; font-size:13px; color:#dbe5ff; }
    .compare-line .v { font-variant-numeric:tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .details { margin-top:4px; }
    .detail-line { padding:14px 14px 12px; border-radius:14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); min-height:92px; }
    .detail-title { font-size:12px; color:#c8d3ee; margin-bottom:8px; letter-spacing:.03em; font-weight:700; }
    .detail-line .mono { display:block; line-height:1.7; word-break:break-word; white-space:normal; font-size:15px; font-weight:700; color:#f4f7ff; text-shadow:0 0 1px rgba(255,255,255,.12); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    .detail-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .detail-card { border:1px solid rgba(105,169,255,.42); box-shadow:0 10px 36px rgba(0,0,0,.24); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.07); text-align:left; vertical-align:top; }
    th { color:#b7c1db; position:sticky; top:0; background:rgba(10,16,31,.96); z-index:1; }
    .mono { font-variant-numeric: tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .muted { color:var(--muted); }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; background:rgba(255,255,255,.06); margin-right:6px; margin-bottom:4px; }
    .good { color:#bbf7d0; background:rgba(74,222,128,.12); }
    .warn { color:#fde68a; background:rgba(251,191,36,.12); }
    .wrap { overflow:auto; max-height: 78vh; }
    .small { font-size:12px; }
  </style>
</head>
<body>
<header>
  <h1>往期预测记录</h1>
  <div class="sub">
    <span>查看每一期预测的生成、回测和命中记录</span>
    <span id="refresh-status">刷新中…</span>
  </div>
  <div class="nav">
    <a href="/">首页总览</a>
    <a href="/modules">模块页</a>
    <a href="/monitor">实时监控</a>
    <a href="/observer">旁路观察器</a>
    <a href="/predictions" class="primary">往期预测</a>
  </div>
</header>
<main>
  <div class="grid stats" id="stats"></div>

  <div class="card" style="margin-top:14px;">
    <div class="toolbar">
      <span class="chip">模型准确率总览</span>
      <span class="chip">训练 / 验证 / 测试 / 回测</span>
    </div>
    <div id="accuracy-overview" class="accuracy-grid"></div>
  </div>

  <div class="card" style="margin-top:14px;">
    <div class="toolbar">
      <span class="chip">目标期号</span>
      <span class="chip">基准期号</span>
      <span class="chip">生成时间</span>
      <span class="chip">回测状态</span>
      <span class="chip">命中统计</span>
    </div>
    <div class="wrap">
      <table id="history-table"></table>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <div class="toolbar">
      <span class="chip">回测摘要</span>
      <span class="chip">命中统计</span>
      <span class="chip">最新状态</span>
    </div>
    <div id="summary-panel" class="compare-grid"></div>
  </div>

  <div class="card" style="margin-top:14px;">
    <div class="toolbar">
      <span class="chip">号码详情模块</span>
      <span class="chip">Top3 / 冠亚和 / 龙虎 / 大小单双</span>
      <span class="chip">点击表格行查看</span>
    </div>
    <div id="detail-panel" class="wrap" style="max-height:none;"></div>
  </div>
</main>
<script>
const api = async (url) => {
  const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
};
const esc = (s) => String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','&lt;':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const el = (id) => document.getElementById(id);
const setText = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
const metricCard = (label, value, sub, width) => `<div class="card metric-card"><div class="title">${esc(label)}</div><div class="value">${esc(String(value))}</div><div class="progress-row"><div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0, Math.min(100, width ?? 0))}%;"></div></div></div><div class="sub">${esc(String(sub || ''))}</div></div>`;
const compareBox = (title, items) => `<div class="compare-box"><h3>${esc(title)}</h3>${(items || []).map(([k, v]) => `<div class="compare-line"><span>${esc(k)}</span><span class="v">${esc(String(v))}</span></div>`).join('')}</div>`;
let bootstrapPredictions = window.__INITIAL_PREDICTIONS__ || null;
window.__INITIAL_PREDICTIONS__ = null;
let lastRecords = [];
let selectedRoundno = null;

function fmtStatus(row) {
  if (!row.evaluated_at) return '<span class="pill warn">未回测</span>';
  return '<span class="pill good">已回测</span>';
}

function formatSide(side) {
  if (!side) return { sum: '-', ranks: '-', dragons: '-' };
  const sum = side.sum ? `${side.sum.bigsmall || '-'} / ${side.sum.oddeven || '-'}` : '-';
  const ranks = (side.rankCategories || []).map(x => `${x.label}:${x.value}`).join(' | ') || '-';
  const dragons = (side.dragonTiger || []).map(x => `${x.label}:${x.value}`).join(' | ') || '-';
  return { sum, ranks, dragons };
}

function formatTop3(top3) {
  if (!Array.isArray(top3) || !top3.length) return '-';
  return top3.map(x => `${x.label || '-'}：${(x.top3 || []).join(' / ')}`).join(' | ');
}

function renderDetail(rows) {
  const listRows = Array.isArray(rows) ? rows : [];
  const current = listRows.find(r => r.target_roundno === selectedRoundno) || listRows[0] || null;
  if (!selectedRoundno && current) selectedRoundno = current.target_roundno;
  const side = current ? formatSide(current.side || {}) : { sum: '-', ranks: '-', dragons: '-' };
  const detailCard = current ? `
    <div class="card detail-card" style="margin-bottom:12px; padding:14px;">
      <div class="toolbar" style="margin-bottom:10px;">
        <span class="chip">当前选中 <b class="mono">${esc(current.target_roundno || '-')}</b></span>
        <span class="chip">基准期号 <b class="mono">${esc(current.based_on_roundno || '-')}</b></span>
        <span class="chip">状态 ${fmtStatus(current)}</span>
        <span class="chip">置信度 <b class="mono">${esc(Number(current.confidence ?? 0).toFixed(4))}</b></span>
      </div>
      <div class="details detail-grid">
        <div class="detail-line"><div class="detail-title">预测 Top3 号码</div><div class="mono">${esc(formatTop3(current.top3 || []))}</div></div>
        <div class="detail-line"><div class="detail-title">融合 Top3</div><div class="mono">${esc((current.fusion || []).slice(0, 3).map(x => (x.top3 || []).join(' / ')).join(' | ') || '-')}</div></div>
        <div class="detail-line"><div class="detail-title">冠亚和</div><div class="mono">${esc(side.sum)}</div></div>
        <div class="detail-line"><div class="detail-title">龙虎</div><div class="mono">${esc(side.dragons)}</div></div>
        <div class="detail-line"><div class="detail-title">冠亚名次</div><div class="mono">${esc(side.ranks)}</div></div>
        <div class="detail-line"><div class="detail-title">命中统计</div><div class="mono">总命中 ${esc(String(current.accuracy_total ?? '-'))}/${esc(String(current.accuracy_possible ?? '-'))} ｜ 位置 ${esc(String(current.rank_hits ?? '-'))}/${esc(String(current.rank_possible ?? '-'))} ｜ 冠亚和 ${esc(String(current.sum_hits ?? '-'))}/${esc(String(current.sum_possible ?? '-'))} ｜ 龙虎 ${esc(String(current.dragon_hits ?? '-'))}/${esc(String(current.dragon_possible ?? '-'))}</div></div>
      </div>
    </div>` : '<div class="muted">暂无预测记录</div>';
  const list = listRows.slice(0, 20).map(r => {
    const rowSide = formatSide(r.side || {});
    return `
      <button type="button" class="card detail-card" data-roundno="${esc(r.target_roundno || '')}" style="margin-bottom:12px; padding:14px; width:100%; text-align:left; border:1px solid ${r.target_roundno === selectedRoundno ? 'rgba(105,169,255,.45)' : 'rgba(255,255,255,.08)'}; cursor:pointer;">
        <div class="toolbar" style="margin-bottom:10px;">
          <span class="chip">目标期号 <b class="mono">${esc(r.target_roundno || '-')}</b></span>
          <span class="chip">基准期号 <b class="mono">${esc(r.based_on_roundno || '-')}</b></span>
          <span class="chip">状态 ${fmtStatus(r)}</span>
          <span class="chip">置信度 <b class="mono">${esc(Number(r.confidence ?? 0).toFixed(4))}</b></span>
        </div>
        <div class="details detail-grid">
          <div class="detail-line"><div class="detail-title">预测 Top3 号码</div><div class="mono">${esc(formatTop3(r.top3 || []))}</div></div>
          <div class="detail-line"><div class="detail-title">融合 Top3</div><div class="mono">${esc((r.fusion || []).slice(0, 3).map(x => (x.top3 || []).join(' / ')).join(' | ') || '-')}</div></div>
          <div class="detail-line"><div class="detail-title">冠亚和</div><div class="mono">${esc(rowSide.sum)}</div></div>
          <div class="detail-line"><div class="detail-title">龙虎</div><div class="mono">${esc(rowSide.dragons)}</div></div>
          <div class="detail-line"><div class="detail-title">冠亚名次</div><div class="mono">${esc(rowSide.ranks)}</div></div>
          <div class="detail-line"><div class="detail-title">命中统计</div><div class="mono">总命中 ${esc(String(r.accuracy_total ?? '-'))}/${esc(String(r.accuracy_possible ?? '-'))} ｜ 位置 ${esc(String(r.rank_hits ?? '-'))}/${esc(String(r.rank_possible ?? '-'))} ｜ 冠亚和 ${esc(String(r.sum_hits ?? '-'))}/${esc(String(r.sum_possible ?? '-'))} ｜ 龙虎 ${esc(String(r.dragon_hits ?? '-'))}/${esc(String(r.dragon_possible ?? '-'))}</div></div>
        </div>
        <div class="small muted" style="margin-top:10px;">点击这条查看详细内容</div>
      </button>`;
  }).join('');
  document.getElementById('detail-panel').innerHTML = detailCard + list;
  document.querySelectorAll('#detail-panel [data-roundno]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedRoundno = btn.dataset.roundno || null;
      renderDetail(lastRecords);
    });
  });
}

function render(rows) {
  lastRecords = Array.isArray(rows) ? rows : [];
  if (lastRecords.length && !lastRecords.some(r => r.target_roundno === selectedRoundno)) {
    selectedRoundno = lastRecords[0].target_roundno;
  }
  const head = '<tr><th>目标期号</th><th>基准期号</th><th>生成时间</th><th>模型</th><th>状态</th><th>命中</th><th>位置</th><th>冠亚和</th><th>龙虎</th><th>详情</th><th>置信度</th></tr>';
  const body = lastRecords.map(r => {
    const side = formatSide(r.side || {});
    const summary = `<div class="small muted">Top3：${esc(formatTop3(r.top3 || []))}</div><div class="small muted">冠亚和：${esc(side.sum)} ｜ 龙虎：${esc(side.dragons)}</div>`;
    return `<tr data-roundno="${esc(r.target_roundno || '')}" style="cursor:pointer;${r.target_roundno === selectedRoundno ? 'background:rgba(105,169,255,.08);' : ''}">
      <td class="mono">${esc(r.target_roundno || '-')}</td>
      <td class="mono">${esc(r.based_on_roundno || '-')}</td>
      <td class="mono">${esc(r.generated_at || '-')}</td>
      <td>${esc(r.model_version || '-')}</td>
      <td>${fmtStatus(r)}</td>
      <td class="mono">${esc(String(r.accuracy_total ?? '-'))}/${esc(String(r.accuracy_possible ?? '-'))}</td>
      <td class="mono">${esc(String(r.rank_hits ?? '-'))}/${esc(String(r.rank_possible ?? '-'))}</td>
      <td class="mono">${esc(String(r.sum_hits ?? '-'))}/${esc(String(r.sum_possible ?? '-'))}</td>
      <td class="mono">${esc(String(r.dragon_hits ?? '-'))}/${esc(String(r.dragon_possible ?? '-'))}</td>
      <td>${summary}</td>
      <td class="mono">${esc(Number(r.confidence ?? 0).toFixed(4))}</td>
    </tr>`;
  }).join('');
  document.getElementById('history-table').innerHTML = head + (body || '<tr><td colspan="11" class="muted">暂无预测记录</td></tr>');
  document.querySelectorAll('#history-table tr[data-roundno]').forEach(tr => {
    tr.addEventListener('click', () => {
      selectedRoundno = tr.dataset.roundno || null;
      renderDetail(lastRecords);
    });
  });
}


async function refresh() {
  try {
    const data = bootstrapPredictions ? { records: bootstrapPredictions } : await api('/api/predictions?limit=120');
    bootstrapPredictions = null;
    const records = data.records || [];
    if (!selectedRoundno || !records.some(r => r.target_roundno === selectedRoundno)) {
      selectedRoundno = records[0]?.target_roundno || null;
    }
    const evaluated = records.filter(r => r.evaluated_at);
    const total = records.length || 0;
    const hitRate = total ? ((records.reduce((sum, r) => sum + Number(r.accuracy_total || 0), 0) / Math.max(1, records.reduce((sum, r) => sum + Number(r.accuracy_possible || 0), 0))) * 100) : 0;
    const rankRate = total ? ((records.reduce((sum, r) => sum + Number(r.rank_hits || 0), 0) / Math.max(1, records.reduce((sum, r) => sum + Number(r.rank_possible || 0), 0))) * 100) : 0;
    const sumRate = total ? ((records.reduce((sum, r) => sum + Number(r.sum_hits || 0), 0) / Math.max(1, records.reduce((sum, r) => sum + Number(r.sum_possible || 0), 0))) * 100) : 0;
    const dragonRate = total ? ((records.reduce((sum, r) => sum + Number(r.dragon_hits || 0), 0) / Math.max(1, records.reduce((sum, r) => sum + Number(r.dragon_possible || 0), 0))) * 100) : 0;

    document.getElementById('stats').innerHTML = [
      metricCard('记录总数', total, '往期预测 / 回测记录', Math.min(100, total ? 100 : 0)),
      metricCard('已回测', evaluated.length, '已完成回测的记录', total ? (evaluated.length / total) * 100 : 0),
      metricCard('总命中率', `${hitRate.toFixed(2)}%`, 'accuracy_total / accuracy_possible', hitRate),
      metricCard('最近生成', records[0]?.generated_at || '-', records[0]?.target_roundno || '最新一条', 100),
    ].join('');

    const summaryRates = [
      ['整体准确率', `${hitRate.toFixed(2)}%`, 'accuracy_total / accuracy_possible', hitRate],
      ['位置命中率', `${rankRate.toFixed(2)}%`, 'rank_hits / rank_possible', rankRate],
      ['冠亚和命中率', `${sumRate.toFixed(2)}%`, 'sum_hits / sum_possible', sumRate],
      ['龙虎命中率', `${dragonRate.toFixed(2)}%`, 'dragon_hits / dragon_possible', dragonRate],
    ];
    document.getElementById('accuracy-overview').innerHTML = summaryRates.map(([label, value, sub, width]) => metricCard(label, value, sub, width)).join('');

    document.getElementById('summary-panel').innerHTML = [
      compareBox('命中统计', [
        ['位置命中率', `${rankRate.toFixed(2)}%`],
        ['冠亚和命中率', `${sumRate.toFixed(2)}%`],
        ['龙虎命中率', `${dragonRate.toFixed(2)}%`],
      ]),
      compareBox('最近状态', [
        ['最新目标期号', records[0]?.target_roundno || '-'],
        ['最新基准期号', records[0]?.based_on_roundno || '-'],
        ['最新模型', records[0]?.model_version || '-'],
      ]),
    ].join('');

    render(records);
    renderDetail(records);
    setText('refresh-status', '已刷新 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false }));
  } catch (err) {
    console.error('[predictions refresh]', err);
    const status = document.getElementById('refresh-status');
    if (status && !status.textContent.includes('已刷新')) status.textContent = '数据加载中，自动重试';
  }
}
refresh();
setInterval(refresh, 10000);
window.addEventListener('focus', refresh);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
</script>
</body>
</html>
