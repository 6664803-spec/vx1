<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>xv1 GPT5.5 分析师 v3</title><style>:root{--text:#eef2ff;--muted:#9aa6c3;--good:#4ade80;--warn:#fbbf24}*{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui;background:linear-gradient(180deg,#050816,#07111f 30%,#04060f);color:var(--text)}header{padding:20px 24px 12px;position:sticky;top:0;background:rgba(5,8,22,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}h1{margin:0 0 8px;font-size:22px}h2{margin:0 0 10px;font-size:17px}h3{margin:0 0 8px;font-size:14px}.sub,.small{color:var(--muted);font-size:13px;line-height:1.6}.nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.nav a{color:#dbe5ff;text-decoration:none;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}.nav a.primary{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.28);color:#bbf7d0}main{max-width:1420px;margin:0 auto;padding:18px}.grid{display:grid;gap:14px}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.top3-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.card{background:linear-gradient(180deg,rgba(18,26,51,.96),rgba(10,16,31,.96));border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;box-shadow:0 12px 50px rgba(0,0,0,.22)}.label{color:var(--muted);font-size:12px;text-transform:uppercase}.value{margin-top:8px;font-size:25px;font-weight:800;font-family:ui-monospace,monospace}.mono{font-family:ui-monospace,monospace}.pos{padding:10px;border-radius:12px;background:rgba(255,255,255,.045)}.pill,.candidate,.actual{display:inline-flex;padding:3px 7px;border-radius:7px;margin:1px 2px;background:rgba(255,255,255,.07);font-size:12px}.pill.good,.candidate.hit,.actual{background:rgba(74,222,128,.16);color:#bbf7d0}.pill.warn{background:rgba(251,191,36,.14);color:#fde68a}.hit-text{color:#bbf7d0;font-weight:700}.miss-text{color:#fecaca}.table-wrap{overflow:auto}.history-table{width:100%;border-collapse:collapse;min-width:1120px}.history-table th,.history-table td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top;font-size:13px}.history-table th{color:var(--muted)}@media(max-width:1000px){.four,.two,.top3-grid{grid-template-columns:1fr}}</style></head><body><header><h1>xv1 GPT5.5 分析师 v3</h1><div class="sub"><span>多模型位置矩阵 + 分位置Top3命中率 + 加权重合率 + 错误反推。</span><span id="refresh-status">已加载</span></div><div class="nav"><a href="/">首页</a><a href="/gpt55-analyst-v2">分析师v2</a><a href="/gpt55-analyst-v3" class="primary">分析师v3</a><a href="/bypass-table">旁路表</a><a href="/modules">模块</a></div></header><main><div class="grid four" id="metric-grid"></div><div class="grid two" style="margin-top:14px"><div class="card"><h2>最新 v3 Top3</h2><div class="top3-grid" id="top3-grid"></div></div><div class="card"><h2>模型矩阵说明</h2><div id="module-state"></div></div></div><div class="card" style="margin-top:14px"><h2>每位置模型可靠度 Top3</h2><div class="top3-grid" id="stat-grid"></div></div><div class="card" style="margin-top:14px"><h2>重合率可靠度分析</h2><div class="top3-grid" id="overlap-grid"></div></div><div class="card" style="margin-top:14px"><h2>历史回测近30期</h2><div class="table-wrap"><table class="history-table"><thead><tr><th>期号</th><th>实际</th><th>命中位置</th><th>Top1</th><th>Top3</th><th>错误原因</th></tr></thead><tbody id="history-body"></tbody></table></div></div></main><script>(function(){const data=window.__XV1_SUMMARY__||{};const a=data.predictions?.analystV3||{};const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const el=id=>document.getElementById(id);const m=a.metrics||{};const card=(k,v,d,cls='')=>`<div class="card"><div class="label">${esc(k)}</div><div class="value ${cls}">${esc(v)}</div><div class="small">${esc(d)}</div></div>`;el('metric-grid').innerHTML=[card('状态',a.enabled?'ON':'OFF',a.mode||''),card('Top1',`${m.top1Rate??0}%`,`${m.top1Hits??0}/${m.possible??0}`),card('Top3',`${m.top3Rate??0}%`,`${m.top3Hits??0}/${m.possible??0}`),card('样本',m.samples??0,a.table||'')].join('');const latest=a.latest||{};el('top3-grid').innerHTML=(latest.top3||[]).map(r=>`<div class="pos"><h3>${esc(r.label)}</h3><div class="mono">${esc((r.top3||[]).join(' / '))}</div><div class="small">score ${esc(r.score)} · conf ${esc(r.confidence)}</div><div class="small">${esc(r.note)}</div></div>`).join('');el('module-state').innerHTML=[['模块',a.name||'GPT5.5 分析师 v3'],['写入',a.lastWrite?.written??0],['表',a.table||'-'],['说明',a.description||'-']].map(([k,v])=>`<div class="small"><b>${esc(k)}</b>：<span class="mono">${esc(v)}</span></div>`).join('')+'<div style="margin-top:10px"><span class="pill good">多模型矩阵</span><span class="pill warn">重合率</span><span class="pill">分位置回测</span></div>';const statsByPos={};(a.modelPositionStats||[]).forEach(s=>{(statsByPos[s.position]||(statsByPos[s.position]=[])).push(s)});el('stat-grid').innerHTML=Array.from({length:10},(_,i)=>{const rows=(statsByPos[i+1]||[]).slice(0,3);return `<div class="pos"><h3>第${i+1}名</h3>${rows.map(x=>`<div class="small"><b>${esc(x.model_name)}</b> ${esc(x.signal_type)} · 权重 ${esc(x.weight)} · T3 ${esc(x.top3_rate)}%</div>`).join('')}</div>`}).join('');el('overlap-grid').innerHTML=(latest.overlap||[]).map(o=>`<div class="pos"><h3>${esc(o.label)}</h3>${(o.candidates||[]).slice(0,3).map(c=>`<div class="small"><b>${esc(c.num)}</b> 分 ${esc(c.score)} · 模型 ${esc(c.modelCount)} · 信号 ${esc(c.signalCount)}</div>`).join('')}</div>`).join('');const actual=arr=>(arr||[]).map(n=>`<span class="actual">${esc(n)}</span>`).join('');const hits=r=>(r.compare||[]).filter(c=>c.top3Hit).map(c=>`<span class="candidate hit">${esc(c.label)}:${esc(c.actual)} ${c.top1Hit?'Top1':'Top3'}</span>`).join('')||'<span class="miss-text">无</span>';el('history-body').innerHTML=(a.rows||[]).map(r=>`<tr><td class="mono">${esc(r.target_roundno)}</td><td>${actual(r.actual)||'-'}</td><td>${hits(r)}</td><td class="mono">${esc(r.top1_hits??0)}/${esc(r.possible??10)}</td><td class="mono">${esc(r.top3_hits??0)}/${esc(r.possible??10)}</td><td>${(r.errors||[]).slice(0,3).map(e=>`<span class="pill warn">${esc(e.label)}:${esc(e.missReason)}</span>`).join('')||'<span class="pill good">无</span>'}</td></tr>`).join('');el('refresh-status').textContent='已刷新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});})();</script></body></html>
