<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>xv1 GPT5.5 数据分析师</title><style>:root{--bg:#07111f;--card:#101a31;--text:#eef2ff;--muted:#9aa6c3;--good:#4ade80;--warn:#fbbf24;--bad:#f87171}*{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#050816,#07111f 30%,#04060f);color:var(--text)}header{padding:20px 24px 12px;position:sticky;top:0;z-index:5;background:rgba(5,8,22,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}h1{margin:0 0 8px;font-size:22px}h2{margin:0 0 10px;font-size:17px}h3{margin:0 0 8px;font-size:14px}.sub,.small{color:var(--muted);font-size:13px;line-height:1.6}.nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.nav a{color:#dbe5ff;text-decoration:none;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}.nav a.primary{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.28);color:#bbf7d0}main{max-width:1380px;margin:0 auto;padding:18px}.grid{display:grid;gap:14px}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.top3-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.card{background:linear-gradient(180deg,rgba(18,26,51,.96),rgba(10,16,31,.96));border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;box-shadow:0 12px 50px rgba(0,0,0,.22)}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}.value{margin-top:8px;font-size:25px;font-weight:800;font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.mono{font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.pos{padding:10px;border-radius:12px;background:rgba(255,255,255,.045)}.pill{display:inline-flex;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.06);color:#dbe5ff;margin:0 6px 6px 0;font-size:12px}.pill.good{background:rgba(74,222,128,.12);color:#bbf7d0}.pill.warn{background:rgba(251,191,36,.12);color:#fde68a}.table-wrap{overflow:auto}.history-table{width:100%;border-collapse:collapse;min-width:980px}.history-table th,.history-table td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top;font-size:13px}.history-table th{color:var(--muted);font-weight:600}.actual,.candidate{display:inline-flex;padding:2px 5px;border-radius:6px;margin:1px 2px 1px 0}.actual{background:rgba(74,222,128,.16);color:#bbf7d0}.candidate{background:rgba(255,255,255,.07);color:#dbe5ff}.candidate.hit{background:rgba(74,222,128,.18);color:#bbf7d0}.hit-text{color:#bbf7d0;font-weight:700}.miss-text{color:#fecaca}@media(max-width:1000px){.four,.two,.top3-grid{grid-template-columns:1fr}}</style></head><body><header><h1>xv1 GPT5.5 数据分析师</h1><div class="sub"><span>基于历史窗口、遗漏、热冷和主/v2/v3分歧做结构化分析，不接管主链。</span><span id="refresh-status">已加载</span></div><div class="nav"><a href="/">新首页</a><a href="/predictions">预测</a><a href="/gpt55-bypass">v2</a><a href="/gpt55-bypass-v3">v3</a><a href="/bypass-table">旁路表</a><a href="/gpt55-analyst" class="primary">GPT5.5分析师</a>
    <a href="/gpt55-analyst-v2">GPT5.5分析师v2</a>
    <a href="/gpt55-analyst-v3">GPT5.5分析师v3</a><a href="/modules">模块</a></div></header><main><div class="grid four" id="metric-grid"></div><div class="grid two" style="margin-top:14px"><div class="card"><h2>下期分析师 Top3</h2><div class="small" id="next-meta"></div><div class="top3-grid" style="margin-top:12px" id="next-top3"></div></div><div class="card"><h2>模块说明</h2><div id="module-state"></div></div></div><div class="card" style="margin-top:14px"><h2>分析理由</h2><div class="top3-grid" id="reason-grid"></div></div><div class="card" style="margin-top:14px"><h2>历史回测近 30 期</h2><div class="table-wrap"><table class="history-table"><thead><tr><th>期号</th><th>实际</th><th>命中位置</th><th>Top1</th><th>Top3</th><th>评估</th></tr></thead><tbody id="history-body"></tbody></table></div></div></main><script>(function(){const data=window.__XV1_SUMMARY__||{};const analyst=data.predictions?.analyst||{};const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const el=id=>document.getElementById(id);const m=analyst.metrics||{};const card=(k,v,d,cls='')=>`<div class="card"><div class="label">${esc(k)}</div><div class="value ${cls}">${esc(v)}</div><div class="small">${esc(d)}</div></div>`;el('metric-grid').innerHTML=[card('状态',analyst.enabled?'ON':'OFF',analyst.mode||'analyst-shadow',analyst.enabled?'hit-text':''),card('Top1',`${m.top1Rate??0}%`,`${m.top1Hits??0}/${m.possible??0}`),card('Top3',`${m.top3Rate??0}%`,`${m.top3Hits??0}/${m.possible??0}`),card('样本',m.samples??0,'近30期已评估')].join('');const renderTop3=rows=>(rows||[]).map(r=>`<div class="pos"><h3>${esc(r.label)}</h3><div class="mono">${esc((r.top3||[]).join(' / '))}</div><div class="small">score ${esc(r.score??'-')} · conf ${esc(r.confidence??'-')}</div><div class="small">${esc(r.note||'')}</div></div>`).join('')||'<div class="pos"><h3>暂无</h3><div class="small">无输出</div></div>';el('next-meta').textContent=`表：${analyst.table||'-'} · 模式：${analyst.mode||'-'}`;el('next-top3').innerHTML=renderTop3(analyst.next?.top3||[]);el('module-state').innerHTML=[['模块',analyst.name||'GPT5.5 数据分析师 v1'],['表',analyst.table||'-'],['写入',analyst.lastWrite?.written??0],['说明',analyst.description||'-']].map(([k,v])=>`<div class="small"><b>${esc(k)}</b>：<span class="mono">${esc(v)}</span></div>`).join('')+'<div style="margin-top:10px"><span class="pill good">历史窗口</span><span class="pill warn">遗漏/热冷</span><span class="pill">分歧分析</span></div>';el('reason-grid').innerHTML=(analyst.next?.reasons||[]).map(r=>`<div class="pos"><h3>${esc(r.label)}</h3><div class="mono">${esc((r.selected||[]).join(' / '))}</div><div class="small">${esc(r.reason||'')}</div><div class="small">${(r.topSignals||[]).slice(0,3).map(x=>`${esc(x.num)}:${esc(x.score)}`).join(' · ')}</div></div>`).join('');const actual=arr=>(arr||[]).map(n=>`<span class="actual">${esc(String(n).padStart(2,'0'))}</span>`).join('');const hitPos=row=>{const hits=(row.compare||[]).filter(c=>c.top3Hit);return hits.map(c=>`<span class="candidate hit">${esc(c.label)}:${esc(c.actual)} ${c.top1Hit?'Top1':'Top3'}</span>`).join('')||'<span class="miss-text">无命中</span>'};el('history-body').innerHTML=(analyst.rows||[]).map(r=>`<tr><td class="mono">${esc(r.target_roundno)}</td><td>${actual(r.actual)||'-'}</td><td>${hitPos(r)}</td><td class="mono ${Number(r.top1_hits||0)?'hit-text':'miss-text'}">${esc(r.top1_hits??0)}/${esc(r.possible??10)}</td><td class="mono ${Number(r.top3_hits||0)?'hit-text':'miss-text'}">${esc(r.top3_hits??0)}/${esc(r.possible??10)}</td><td class="mono">${esc(r.evaluated_at||'-')}</td></tr>`).join('')||'<tr><td colspan="6" class="small">暂无历史</td></tr>';el('refresh-status').textContent='已刷新 '+new Date().toLocaleTimeString('zh-CN',{hour12:false});})();</script></body></html>
