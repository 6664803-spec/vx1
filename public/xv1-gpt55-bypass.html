<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>xv1 GPT5.5 旁路模块</title>
  <style>
    :root { --bg:#07111f; --card:#101a31; --text:#eef2ff; --muted:#9aa6c3; --good:#4ade80; --warn:#fbbf24; --bad:#f87171; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:linear-gradient(180deg, #050816, #07111f 30%, #04060f); color:var(--text); }
    header { padding:20px 24px 12px; position:sticky; top:0; z-index:5; background:rgba(5,8,22,.9); backdrop-filter: blur(10px); border-bottom:1px solid rgba(255,255,255,.08); }
    h1 { margin:0 0 8px; font-size:22px; }
    h2 { margin:0 0 10px; font-size:17px; }
    h3 { margin:0 0 8px; font-size:14px; }
    .sub,.small { color:var(--muted); font-size:13px; line-height:1.6; }
    .nav { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .nav a { color:#dbe5ff; text-decoration:none; padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); }
    .nav a.primary { background:rgba(74,222,128,.14); border-color:rgba(74,222,128,.28); color:#bbf7d0; }
    main { max-width:1350px; margin:0 auto; padding:18px; }
    .grid { display:grid; gap:14px; }
    .four { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .two { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .card { background:linear-gradient(180deg, rgba(18,26,51,.96), rgba(10,16,31,.96)); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:16px; box-shadow:0 12px 50px rgba(0,0,0,.22); }
    .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .value { margin-top:8px; font-size:25px; font-weight:800; font-variant-numeric:tabular-nums; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }
    .mono { font-variant-numeric:tabular-nums; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }
    .line { display:flex; justify-content:space-between; gap:10px; margin:8px 0; font-size:13px; }
    .pill { display:inline-flex; padding:4px 9px; border-radius:999px; background:rgba(255,255,255,.06); color:#dbe5ff; margin:0 6px 6px 0; font-size:12px; }
    .pill.good { background:rgba(74,222,128,.12); color:#bbf7d0; }
    .pill.warn { background:rgba(251,191,36,.12); color:#fde68a; }
    .pill.bad { background:rgba(248,113,113,.12); color:#fecaca; }
    .top3-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .pos { padding:10px; border-radius:12px; background:rgba(255,255,255,.045); }
    .history-table { width:100%; border-collapse:collapse; min-width:980px; }
    .history-table th,.history-table td { padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; vertical-align:top; font-size:13px; }
    .history-table th { color:var(--muted); font-weight:600; }
    .table-wrap { overflow:auto; }
    .actual,.candidate { display:inline-flex; padding:2px 5px; border-radius:6px; margin:1px 2px 1px 0; }
    .actual { background:rgba(74,222,128,.16); color:#bbf7d0; }
    .candidate { background:rgba(255,255,255,.07); color:#dbe5ff; }
    .candidate.hit { background:rgba(74,222,128,.18); color:#bbf7d0; }
    .hit-text { color:#bbf7d0; font-weight:700; }
    .miss-text { color:#fecaca; }
    @media (max-width: 1000px) { .four,.two,.top3-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <h1>xv1 GPT5.5 旁路模块</h1>
  <div class="sub"><span>独立 shadow 模块：只观察、只回测、只展示，不覆盖主模型输出。</span><span id="refresh-status">已加载</span></div>
  <div class="nav">
    <a href="/">新首页</a>
    <a href="/overview">总览</a>
    <a href="/monitor">监控</a>
    <a href="/predictions">预测</a>
    <a href="/gpt55-bypass" class="primary">GPT5.5旁路v2</a>
    <a href="/gpt55-bypass-v3">GPT5.5旁路v3</a>
    <a href="/bypass-table">旁路独立表</a>
    <a href="/gpt55-analyst">GPT5.5分析师</a>
    <a href="/modules">模块</a>
  </div>
</header>
<main>
  <div class="grid four" id="metric-grid"></div>

  <div class="grid two" style="margin-top:14px;">
    <div class="card">
      <h2>下期旁路 Top3</h2>
      <div class="small" id="next-meta"></div>
      <div class="top3-grid" style="margin-top:12px;" id="next-top3"></div>
    </div>
    <div class="card">
      <h2>模块状态</h2>
      <div id="module-state"></div>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2>旁路 vs 主模型</h2>
    <div class="small">近 30 期独立统计。若旁路长期稳定超过主模型，再考虑进入融合；当前不会影响正式预测。</div>
    <div class="grid two" style="margin-top:12px;" id="compare-grid"></div>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2>旁路历史比对（近 30 期）</h2>
    <div class="small">显示 GPT5.5 旁路 v2 对每期的实际号码、Top1/Top3 命中和逐位置候选。</div>
    <div class="table-wrap" style="margin-top:12px;">
      <table class="history-table">
        <thead><tr><th>期号</th><th>实际开奖</th><th>Top1</th><th>Top3</th><th>逐位置比对</th><th>评估时间</th></tr></thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</main>
<script>
(function(){
  const data = window.__XV1_SUMMARY__ || {};
  const pred = data.predictions || {};
  const bypass = pred.bypass || {};
  const esc = (v) => String(v ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const el = (id) => document.getElementById(id);
  const main = pred.metrics || {};
  const bm = bypass.metrics || {};
  const card = (k,v,d,cls='') => `<div class="card"><div class="label">${esc(k)}</div><div class="value ${cls}">${esc(v)}</div><div class="small">${esc(d)}</div></div>`;
  el('metric-grid').innerHTML = [
    card('旁路状态', bypass.enabled ? 'ON' : 'OFF', bypass.mode || 'shadow-only', bypass.enabled ? 'hit-text' : 'miss-text'),
    card('旁路 Top1', `${bm.top1Rate ?? 0}%`, `${bm.top1Hits ?? 0}/${bm.possible ?? 0}`),
    card('旁路 Top3', `${bm.top3Rate ?? 0}%`, `${bm.top3Hits ?? 0}/${bm.possible ?? 0}`),
    card('样本', bm.samples ?? 0, '近 30 期已评估'),
  ].join('');
  const renderTop3 = (rows) => (rows || []).map((r) => `<div class="pos"><h3>${esc(r.label)}</h3><div class="mono">${esc((r.top3 || []).join(' / '))}</div><div class="small">score ${esc(r.score ?? '-')} · conf ${esc(r.confidence ?? '-')}</div><div class="small">${esc(r.note || '')}</div></div>`).join('') || '<div class="pos"><h3>暂无</h3><div class="small">无旁路输出</div></div>';
  el('next-meta').textContent = `目标期：${data.next_roundno || '-'} · 基准：${data.latest_roundno || '-'} · 模型：${bypass.model || 'oc2/gpt-5.5'}`;
  el('next-top3').innerHTML = renderTop3(bypass.next?.top3 || []);
  el('module-state').innerHTML = [
    ['模块', bypass.name || 'GPT5.5 旁路评估 v2'],
    ['模型', bypass.model || 'oc2/gpt-5.5'],
    ['模式', bypass.mode || 'shadow-only'],
    ['说明', bypass.description || '只展示和回测，不覆盖正式输出'],
  ].map(([k,v]) => `<div class="line"><span><b>${esc(k)}</b></span><span class="mono">${esc(v)}</span></div>`).join('') + '<div style="margin-top:10px;"><span class="pill good">主链隔离</span><span class="pill warn">只读候选</span><span class="pill">独立回测</span></div>';
  const deltaTop1 = Number((Number(bm.top1Rate || 0) - Number(main.top1Rate || 0)).toFixed(2));
  const deltaTop3 = Number((Number(bm.top3Rate || 0) - Number(main.top3Rate || 0)).toFixed(2));
  el('compare-grid').innerHTML = [
    card('主模型 Top1', `${main.top1Rate ?? 0}%`, `${main.top1Hits ?? 0}/${main.possible ?? 0}`),
    card('旁路 Top1', `${bm.top1Rate ?? 0}%`, `差值 ${deltaTop1 >= 0 ? '+' : ''}${deltaTop1}%`, deltaTop1 >= 0 ? 'hit-text' : 'miss-text'),
    card('主模型 Top3', `${main.top3Rate ?? 0}%`, `${main.top3Hits ?? 0}/${main.possible ?? 0}`),
    card('旁路 Top3', `${bm.top3Rate ?? 0}%`, `差值 ${deltaTop3 >= 0 ? '+' : ''}${deltaTop3}%`, deltaTop3 >= 0 ? 'hit-text' : 'miss-text'),
  ].join('');
  const actualHtml = (arr) => (arr || []).map((n) => `<span class="actual">${esc(String(n).padStart(2,'0'))}</span>`).join('');
  el('history-body').innerHTML = (bypass.history || []).map((row) => {
    const pos = (row.compare || []).map((c, idx) => {
      const actual = String(c.actual ?? '').padStart(2,'0');
      const nums = (c.top3 || []).map((n) => String(n).padStart(2,'0'));
      return `<div style="margin-bottom:4px;"><b>${esc(c.label || `第${idx+1}名`)}</b> <span class="${c.top3Hit ? 'hit-text' : 'miss-text'}">${esc(actual || '-')}</span> → ${nums.map((n) => `<span class="candidate ${n === actual ? 'hit' : ''}">${esc(n)}</span>`).join('')} <span class="small">${c.top1Hit ? 'Top1' : (c.top3Hit ? 'Top3' : '未中')}</span></div>`;
    }).join('');
    return `<tr><td class="mono">${esc(row.target_roundno || '-')}</td><td>${actualHtml(row.actual) || '-'}</td><td class="mono ${Number(row.top1Hits||0) ? 'hit-text' : 'miss-text'}">${esc(row.top1Hits ?? 0)}/${esc(row.possible ?? 10)}</td><td class="mono ${Number(row.top3Hits||0) ? 'hit-text' : 'miss-text'}">${esc(row.top3Hits ?? 0)}/${esc(row.possible ?? 10)}</td><td>${pos || '-'}</td><td class="mono">${esc(row.evaluated_at || '-')}</td></tr>`;
  }).join('') || '<tr><td colspan="6" class="small">暂无旁路历史</td></tr>';
  el('refresh-status').textContent = '已刷新 ' + new Date().toLocaleTimeString('zh-CN', {hour12:false});
})();
</script>
</body>
</html>
